# Auth0 free-tier tenant (pilot external provider).
# One-time setup: docs/idp-setup/auth0.md. Requires a Machine-to-Machine
# application authorized on an API whose identifier matches `audience` below.
name: auth0
display_name: "Auth0"
tier: external
owner: "@unassigned"
# Not onboarded until a real tenant + IDP_AUTH0_* secrets exist (docs/idp-setup/auth0.md).
onboarded: true
# Auth0 issuers end with a trailing slash, and the platform compares issuer
# strings exactly — keep the slash.
issuer: "https://dev-qelqh15gar561vgu.us.auth0.com/"
audience: "http://localhost:8080"
client_id: "${IDP_AUTH0_CLIENT_ID}"
client_secret: "${IDP_AUTH0_CLIENT_SECRET}"
token_endpoint_params:
  # Auth0 only mints JWT access tokens when an API audience is requested.
  audience: "http://localhost:8080"
# Second registered API identifier, used by the wrong-audience negative test.
wrong_audience: "https://idp-conformance.invalid/"
capabilities:
  dpop: # unknown — set true/false after the first run against a real tenant
  custom_audience: true
  configurable_token_lifetime: true # per-API token lifetime
ers:
  mode: claims
  required_claims: [sub]
platform_overlay:
  dpop_enforce: false
  # Auth0 M2M tokens carry no platform role claims, and the released platform's
  # v1 casbin subjects are the groups claim only. Point the groups claim at
  # gty (always "client-credentials" for M2M tokens) and grant that group the
  # admin role so ERS/policy calls are authorized. Safe here only because the
  # tenant is dedicated to conformance with a single client.
  casbin_groups_claim: gty
  casbin_extension: |
    g, client-credentials, role:admin
known_issues:
  # The go SDK attaches an RS256 DPoP proof to every token request (no
  # opt-out); Auth0 rejects it (invalid_dpop_proof, alg not allowed).
  - check: tdf_roundtrip
    reason: "go SDK sends an RS256 DPoP proof at token acquisition; Auth0 rejects it"
    issue: "https://github.com/arkavo-org/opentdf-platform/issues/25"
